<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messenger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #2b7fdd;
      --blue-dark:  #1a5fa8;
      --blue-light: #e8f2fd;
      --bg:         #eef2f7;
      --surface:    #ffffff;
      --sidebar-bg: #f5f7fa;
      --border:     #dde3ec;
      --text:       #1a1a2e;
      --muted:      #8a95a3;
      --bubble-me:  #2b7fdd;
      --bubble-other: #f0f2f5;
      --shadow:     0 2px 12px rgba(0,0,0,.08);
      --radius:     14px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Login overlay ─────────────────────────────────────────── */
    #login-overlay {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #login-overlay h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    #login-overlay p { font-size: 13px; color: var(--muted); }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label { font-size: 13px; font-weight: 600; color: var(--text); }

    .field input {
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus { border-color: var(--blue); }

    #login-error {
      font-size: 13px;
      color: #e03e3e;
      min-height: 18px;
    }

    .btn-primary {
      padding: 11px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:disabled { background: #a0bfe0; cursor: default; }

    /* ── App shell ─────────────────────────────────────────────── */
    #app {
      display: none;
      width: 100%;
      max-width: 900px;
      height: min(680px, 90vh);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      flex-direction: row;
    }

    /* ── Sidebar ───────────────────────────────────────────────── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    #sidebar-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header .room-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    #sidebar-header .room-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    #sidebar-header .me-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 12px;
      color: var(--blue);
      font-weight: 600;
    }

    #online-label {
      padding: 10px 16px 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #user-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 16px;
      font-size: 14px;
      color: var(--text);
    }

    .user-item .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .user-item.me .avatar { background: var(--blue-dark); }

    .disconnect-btn {
      margin: 12px 16px;
      padding: 8px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .disconnect-btn:hover { color: #e03e3e; border-color: #e03e3e; }

    /* ── Main chat area ────────────────────────────────────────── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #chat-header .title { font-size: 16px; font-weight: 700; color: var(--text); }
    #chat-header .subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* ── Messages ──────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--bg);
    }

    /* Date separator */
    .date-sep {
      align-self: center;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255,255,255,.75);
      padding: 3px 10px;
      border-radius: 20px;
      margin: 8px 0;
    }

    /* Message row */
    .msg-row {
      display: flex;
      flex-direction: column;
    }

    .msg-row.mine { align-items: flex-end; }
    .msg-row.theirs { align-items: flex-start; }

    .msg-author {
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .bubble {
      max-width: 68%;
      padding: 9px 13px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      position: relative;
    }

    .mine .bubble {
      background: var(--bubble-me);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .theirs .bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 5px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    .mine .msg-time { color: rgba(255,255,255,.65); }

    /* System notice */
    .notice {
      align-self: center;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.7);
      padding: 3px 12px;
      border-radius: 20px;
      margin: 4px 0;
      font-style: italic;
    }

    /* Typing indicator */
    #typing-indicator {
      padding: 4px 18px 0;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      min-height: 20px;
      background: var(--bg);
    }

    /* ── Compose bar ───────────────────────────────────────────── */
    #compose {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #compose textarea {
      flex: 1;
      resize: none;
      height: 40px;
      padding: 9px 13px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      line-height: 1.4;
      overflow: hidden;
    }

    #compose textarea:focus { border-color: var(--blue); }
    #compose textarea::placeholder { color: var(--muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--blue);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }

    #send-btn:hover { background: var(--blue-dark); }
    #send-btn:disabled { background: #a0bfe0; cursor: default; }

    #send-btn svg { pointer-events: none; }

    /* ── Scrollbar styling ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Login overlay ──────────────────────────────────────────── -->
<div id="login-overlay">
  <h2>Messenger</h2>
  <p>Enter your username and the room you want to join.</p>

  <div class="field">
    <label for="inp-username">Username</label>
    <input id="inp-username" type="text" placeholder="alice" autocomplete="off" />
  </div>

  <div class="field">
    <label for="inp-room">Room</label>
    <input id="inp-room" type="text" placeholder="general" autocomplete="off" />
  </div>

  <div id="login-error"></div>

  <button class="btn-primary" id="login-btn" onclick="connect()">Connect</button>
</div>

<!-- ── App shell ──────────────────────────────────────────────── -->
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="room-name" id="sb-room"></div>
      <div class="room-sub">Group chat</div>
      <div class="me-badge" id="sb-me"></div>
    </div>
    <div id="online-label">Online</div>
    <div id="user-list"></div>
    <button class="disconnect-btn" onclick="disconnect()">Disconnect</button>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div id="chat-header">
      <div>
        <div class="title" id="ch-room"></div>
        <div class="subtitle" id="ch-subtitle">Connecting…</div>
      </div>
    </div>

    <div id="messages"></div>
    <div id="typing-indicator"></div>

    <div id="compose">
      <textarea id="msg-input" placeholder="Write a message…" rows="1"
        onkeydown="onComposeKey(event)"
        oninput="onTyping()"></textarea>
      <button id="send-btn" disabled onclick="sendMessage()" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────
let ws          = null;
let currentUser = '';
let currentRoom = '';
let myUserId    = null;   // numeric user_id returned by /login
let onlineUsers = new Set();
let typingTimer = null;

const HOST = '192.168.10.171:8080';

// ── Entry point ────────────────────────────────────────────────
async function connect() {
  const username = document.getElementById('inp-username').value.trim();
  const room     = document.getElementById('inp-room').value.trim();

  if (!username || !room) {
    showLoginError('Please fill in both fields.');
    return;
  }

  setLoginBusy(true);

  // 1. Authenticate — obtain session token
  let token;
  try {
    const res = await fetch(`http://${HOST}/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username }),
    });
    if (!res.ok) throw new Error(`Login failed: ${res.status}`);
    const data = await res.json();
    token    = data.token;
    myUserId = data.user_id;
  } catch (err) {
    showLoginError(err.message);
    setLoginBusy(false);
    return;
  }

  currentUser = username;
  currentRoom = room;

  // 2. Open WebSocket with token
  ws = new WebSocket(`ws://${HOST}/ws?token=${encodeURIComponent(token)}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', room }));
    showApp();
  };

  ws.onmessage = e => {
    try { handleIncomingMessage(JSON.parse(e.data)); }
    catch (_) {}
  };

  ws.onclose = () => {
    showLogin('Disconnected from server.');
  };

  ws.onerror = () => {
    showLoginError('WebSocket error. Is the server running?');
    setLoginBusy(false);
  };
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
  myUserId = null;
  showLogin('');
}

// ── Incoming message router ────────────────────────────────────
function handleIncomingMessage(msg) {
  switch (msg.type) {
    case 'chat':
      renderMessage(msg);
      break;

    case 'users_list':
      // Full snapshot sent only to the newly joined client.
      onlineUsers = new Set(msg.users);
      onlineUsers.add(currentUser);
      renderUserList();
      break;

    case 'user_join':
      onlineUsers.add(msg.user);
      renderUserList();
      appendNotice(`${esc(msg.user)} joined`);
      break;

    case 'user_leave':
      onlineUsers.delete(msg.user);
      renderUserList();
      appendNotice(`${esc(msg.user)} left`);
      break;

    case 'typing_start':
      showTyping(msg.user);
      break;

    case 'typing_stop':
      clearTyping(msg.user);
      break;

    default:
      // Unknown frame — ignore silently
      break;
  }
}

// ── Render a chat bubble ───────────────────────────────────────
function renderMessage(msg) {
  const list  = document.getElementById('messages');
  // The backend sends msg.user (username string) and msg.chat_id.
  // UserID is json:"-" so it never arrives on the wire; ownership
  // is determined by comparing the username to currentUser.
  const isMine = msg.user === currentUser;

  const row = document.createElement('div');
  row.className = `msg-row ${isMine ? 'mine' : 'theirs'}`;

  if (!isMine) {
    const author = document.createElement('div');
    author.className = 'msg-author';
    author.textContent = msg.user;
    row.appendChild(author);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = msg.text;
  row.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(new Date());
  row.appendChild(time);

  list.appendChild(row);
  scrollToBottom();
}

// ── Render sidebar user list ───────────────────────────────────
function renderUserList() {
  const list = document.getElementById('user-list');
  list.innerHTML = '';

  // Current user first
  const sorted = [...onlineUsers].sort((a, b) => {
    if (a === currentUser) return -1;
    if (b === currentUser) return 1;
    return a.localeCompare(b);
  });

  for (const name of sorted) {
    const item = document.createElement('div');
    item.className = `user-item${name === currentUser ? ' me' : ''}`;

    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = name[0];
    item.appendChild(av);

    const label = document.createElement('span');
    label.textContent = name === currentUser ? `${name} (you)` : name;
    item.appendChild(label);

    list.appendChild(item);
  }

  document.getElementById('ch-subtitle').textContent =
    `${onlineUsers.size} online`;
}

// ── System notice ──────────────────────────────────────────────
function appendNotice(html) {
  const list = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'notice';
  el.innerHTML = html;
  list.appendChild(el);
  scrollToBottom();
}

// ── Typing indicator ───────────────────────────────────────────
const typingUsers = new Set();

function showTyping(user) {
  typingUsers.add(user);
  updateTypingUI();
}

function clearTyping(user) {
  typingUsers.delete(user);
  updateTypingUI();
}

function updateTypingUI() {
  const el = document.getElementById('typing-indicator');
  if (typingUsers.size === 0) { el.textContent = ''; return; }
  const names = [...typingUsers].join(', ');
  el.textContent = `${names} ${typingUsers.size === 1 ? 'is' : 'are'} typing…`;
}

// ── Send message ───────────────────────────────────────────────
function sendMessage() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;

  ws.send(JSON.stringify({ type: 'chat', text }));
  input.value = '';
  input.style.height = '40px';
  input.focus();
}

function onComposeKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// Auto-grow textarea up to 120px
function onTyping() {
  const ta = document.getElementById('msg-input');
  ta.style.height = '40px';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

// ── UI helpers ─────────────────────────────────────────────────
function showApp() {
  document.getElementById('login-overlay').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  document.getElementById('sb-room').textContent  = `#${currentRoom}`;
  document.getElementById('sb-me').textContent    = `Signed in as ${currentUser}`;
  document.getElementById('ch-room').textContent  = `#${currentRoom}`;
  document.getElementById('ch-subtitle').textContent = 'Joining…';
  document.getElementById('send-btn').disabled    = false;
  document.getElementById('messages').innerHTML   = '';
  document.getElementById('user-list').innerHTML  = '';
  onlineUsers.clear();
  renderUserList();
}

function showLogin(errorMsg) {
  document.getElementById('app').style.display          = 'none';
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('login-btn').disabled          = false;
  showLoginError(errorMsg);
  onlineUsers.clear();
}

function showLoginError(msg) {
  document.getElementById('login-error').textContent = msg || '';
}

function setLoginBusy(busy) {
  document.getElementById('login-btn').disabled = busy;
  document.getElementById('login-btn').textContent = busy ? 'Connecting…' : 'Connect';
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function formatTime(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
